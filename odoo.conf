[options]
; Mot de passe maître (à changer en production)
admin_passwd = admin

; Connexion PostgreSQL (service "db" du docker-compose)
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_filter = .*

; Chemin des addons : addons officiels (image) + addons OAAS montés en volume
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; Performances
limit_time_cpu = 600
limit_time_real = 1200
max_cron_threads = 1
workers = 0

; Logs vers stdout (visibles via "docker compose logs")
logfile = False
